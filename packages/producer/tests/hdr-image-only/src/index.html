<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HDR Image-Only Regression</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
      }
      #main {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #hdr-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      #label {
        position: absolute;
        bottom: 64px;
        left: 64px;
        z-index: 10;
        padding: 16px 28px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 56px;
        font-weight: 700;
        color: #ffffff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 8px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div
      id="main"
      class="clip"
      data-composition-id="hdr-image-only"
      data-start="0"
      data-duration="2"
      data-width="1920"
      data-height="1080"
    >
      <img id="hdr-img" src="hdr-photo.png" alt="HDR PNG" />
      <div id="label">HDR PNG</div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
    </script>
  </body>
</html>
