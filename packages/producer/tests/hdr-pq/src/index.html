<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HDR PQ Regression</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
      }
      #main {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #hdr-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #label {
        position: absolute;
        top: 48px;
        left: 64px;
        z-index: 10;
        padding: 16px 28px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 36px;
        font-weight: 700;
        color: #ffffff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 8px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div
      id="main"
      data-composition-id="hdr-pq"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <video
        id="hdr-video"
        class="clip"
        data-start="0"
        data-duration="5"
        data-track-index="0"
        src="hdr-clip.mp4"
        muted
        playsinline
      ></video>

      <div id="label">HDR PQ</div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
    </script>
  </body>
</html>
